name: lateral-movement-lab

networks:
  - name: lan
    subnet: 192.168.0.0/24

hosts:
  - name: attacker
    image: kali
    interfaces:
      - network: lan
        ip: 192.168.0.3

  - name: workstation
    image: ubuntu-noble-x86_64
    interfaces:
      - network: lan
        ip: 192.168.0.10

  - name: server
    image: ubuntu-noble-x86_64
    interfaces:
      - network: lan
        ip: 192.168.0.2