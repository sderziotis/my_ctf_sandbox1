---
- hosts: server
  become: yes

  vars:
    weak_user: user

  tasks:
    - name: Install packages
      apt:
        name:
          - openssh-server
          - python3
          - python3-pip
          - ufw
        state: present
        update_cache: yes

    - name: Install Flask
      pip:
        name: flask

    - name: Start SSH
      service:
        name: ssh
        state: started
        enabled: yes

    - name: Allow SSH from workstation
      ufw:
        rule: allow
        from_ip: 192.168.0.10
        port: 22

    - name: Deny others
      ufw:
        rule: deny
        port: 22

    - name: Enable firewall
      ufw:
        state: enabled

    - name: Add bash history
      copy:
        content: |
          ssh user@server
          scp secret.txt user@server:/tmp/
        dest: "/home/{{ weak_user }}/.bash_history"

