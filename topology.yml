name: my-demo1-v1.1

hosts:
  - name: attacker
    base_box:
      image: ubuntu-noble-x86_64
      man_user: ubuntu
    flavor: standard.small

  - name: target
    base_box:
      image: ubuntu-noble-x86_64
      man_user: ubuntu
    flavor: standard.small

routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      man_user: debian
    flavor: standard.small

networks:
  - name: attacker-switch
    cidr: 192.168.10.0/24
    accessible_by_user: False

  - name: target-switch
    cidr: 192.168.20.0/24

net_mappings:
  - host: attacker
    network: attacker-switch
    ip: 192.168.10.5
  - host: target
    network: target-switch
    ip: 192.168.20.5

router_mappings:
  - router: router
    network: attacker-switch
    ip: 192.168.10.1
  - router: router
    network: target-switch
    ip: 192.168.20.1

groups: []
