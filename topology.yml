name: library-demo-training-adaptive

hosts:
  - name: server
    base_box:
      image: ubuntu-noble-x86_64
      man_user: ubuntu
    flavor: standard.small

routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      man_user: debian
    flavor: standard.small

networks:
  - name: server-switch
    cidr: 192.168.0.0/24
    accessible_by_user: False

net_mappings:
  - host: server
    network: server-switch
    ip: 192.168.0.10

router_mappings:
  - router: router
    network: server-switch
    ip: 192.168.0.1
    
groups: []